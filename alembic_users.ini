# alembic_users.ini
# Alembic configuration for the USERS / BILLING database only.
# Lives at the project root alongside the existing alembic.ini.
#
# Commands (always pass -c to target this file):
#
#   Generate a migration (auto-detects model changes):
#     alembic -c alembic_users.ini revision --autogenerate -m "describe change here"
#
#   Apply all pending migrations:
#     alembic -c alembic_users.ini upgrade head
#
#   Roll back one migration:
#     alembic -c alembic_users.ini downgrade -1
#
#   See current migration state:
#     alembic -c alembic_users.ini current
#
#   See full migration history:
#     alembic -c alembic_users.ini history --verbose
#
# The sqlalchemy.url below is a placeholder — it is overridden at runtime
# by env.py which reads the real value from app/config.py (your .env file).
# You do NOT need to hardcode credentials here.

[alembic]
script_location = alembic_users
sqlalchemy.url = placeholder_overridden_by_env_py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S